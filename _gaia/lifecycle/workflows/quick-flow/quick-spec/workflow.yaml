name: quick-spec
description: 'Create a quick implementation spec for small changes'
module: lifecycle
agent: dev-*
config_resolved: "{installed_path}/.resolved/quick-spec.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/quick-flow/quick-spec"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/quick-spec-{spec_name}.md"
