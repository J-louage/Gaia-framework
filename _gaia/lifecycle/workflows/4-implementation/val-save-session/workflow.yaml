name: val-save-session
description: 'Persist Val session decisions, findings, and ground truth updates to memory files'
module: lifecycle
agent: validator
model_override: opus
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/val-save-session.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/val-save-session"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
required_skills:
  - "{project-root}/_gaia/lifecycle/skills/memory-management.md"
required_skill_sections:
  - "memory-management:session-load"
  - "memory-management:session-save"
  - "memory-management:decision-formatting"
  - "memory-management:context-summarization"
input_file_patterns:
  session_findings:
    whole: "context"
    load_strategy: "FULL_LOAD"
  decision_log:
    whole: "{project-root}/_memory/validator-sidecar/decision-log.md"
    load_strategy: "FULL_LOAD"
  conversation_context:
    whole: "{project-root}/_memory/validator-sidecar/conversation-context.md"
    load_strategy: "FULL_LOAD"
  ground_truth:
    whole: "{project-root}/_memory/validator-sidecar/ground-truth.md"
    load_strategy: "INDEX_GUIDED"
on_error:
  missing_file: "create_with_template"
  missing_session_context: "halt"
  unresolved_variable: "halt"

output:
  primary: "{project-root}/_memory/validator-sidecar/decision-log.md"
  secondary: "{project-root}/_memory/validator-sidecar/conversation-context.md"
  tertiary: "{project-root}/_memory/validator-sidecar/ground-truth.md"
