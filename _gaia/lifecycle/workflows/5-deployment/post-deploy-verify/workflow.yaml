name: post-deploy-verify
description: 'Post-deployment health and metric validation'
module: lifecycle
agent: devops
config_resolved: "{installed_path}/.resolved/post-deploy-verify.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/5-deployment/post-deploy-verify"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/post-deploy-{date}.md"
