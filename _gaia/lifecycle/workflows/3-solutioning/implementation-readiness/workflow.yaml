name: implementation-readiness
description: 'Validate all artifacts are complete before implementation'
module: lifecycle
agent: architect
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/implementation-readiness.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/3-solutioning/implementation-readiness"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "FULL_LOAD"
  ux:
    whole: "{planning_artifacts}/ux-design.md"
    load_strategy: "FULL_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "FULL_LOAD"
  epics:
    whole: "{planning_artifacts}/epics-and-stories.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/readiness-report.md"
