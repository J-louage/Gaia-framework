name: performance-review
description: 'Analyze performance bottlenecks and recommend optimizations'
module: lifecycle
agent: performance
config_resolved: "{installed_path}/.resolved/performance-review.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/anytime/performance-review"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{test_artifacts}/performance-review-{date}.md"
